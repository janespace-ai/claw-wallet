name: Build Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Generate icons (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: desktop
        run: |
          brew install imagemagick
          mkdir -p /tmp/icon.iconset
          magick assets/icon.png -resize 1024x1024 /tmp/icon.iconset/icon_512x512@2x.png
          magick assets/icon.png -resize 512x512   /tmp/icon.iconset/icon_512x512.png
          magick assets/icon.png -resize 256x256   /tmp/icon.iconset/icon_256x256.png
          magick assets/icon.png -resize 128x128   /tmp/icon.iconset/icon_128x128.png
          magick assets/icon.png -resize 32x32     /tmp/icon.iconset/icon_32x32.png
          magick assets/icon.png -resize 16x16     /tmp/icon.iconset/icon_16x16.png
          iconutil -c icns /tmp/icon.iconset -o assets/icon.icns

      - name: Generate icons (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        run: |
          choco install imagemagick -y
          magick assets/icon.png -resize 256x256 assets/icon.ico

      - name: Import certificate (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v $KEYCHAIN_PATH

      - name: Build
        working-directory: desktop
        run: npm run build

      - name: Package (macOS) — sign only, no notarize
        if: matrix.os == 'macos-latest'
        timeout-minutes: 15
        working-directory: desktop
        run: npm run package -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEYCHAIN: ${{ runner.temp }}/app-signing.keychain-db
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSC_FOR_PULL_REQUEST: true
          ELECTRON_BUILDER_DISABLE_NOTARIZATION: true

      - name: Notarize (macOS)
        if: matrix.os == 'macos-latest'
        timeout-minutes: 30
        run: |
          echo "Zipping app for notarization..."
          ditto -c -k --keepParent \
            "desktop/release/mac-arm64/Claw Wallet.app" \
            /tmp/claw-wallet-notarize.zip

          echo "Submitting to Apple notarytool..."
          xcrun notarytool submit /tmp/claw-wallet-notarize.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "5YVNPMDSC4" \
            --wait \
            --verbose

          echo "Stapling notarization ticket..."
          xcrun stapler staple "desktop/release/mac-arm64/Claw Wallet.app"

          echo "Rebuilding DMG with notarized app..."
          cd desktop && npm run package -- --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEYCHAIN: ${{ runner.temp }}/app-signing.keychain-db
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        run: npm run package -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: desktop/release/*.dmg

      - name: Upload to GitHub Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: desktop/release/*.exe
