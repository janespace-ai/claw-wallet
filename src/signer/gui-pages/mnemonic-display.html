<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">
<title>{{TITLE}} — Claw Wallet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1e293b;border-radius:16px;padding:40px;width:520px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
h1{font-size:20px;margin-bottom:8px;color:#f8fafc}
.warning{color:#fbbf24;font-size:13px;margin-bottom:20px}
.words{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;padding:20px;background:#0f172a;border-radius:12px;border:1px solid #334155}
.word{padding:8px 12px;background:#1e293b;border-radius:6px;font-family:monospace;font-size:14px;text-align:center}
.word .num{color:#64748b;font-size:11px;margin-right:4px}
.timer{text-align:center;color:#94a3b8;font-size:13px;margin-top:16px}
.timer span{color:#fbbf24;font-weight:600}
.buttons{display:flex;gap:12px;margin-top:20px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.btn-copy{background:#3b82f6;color:#fff}
.btn-copy:hover{background:#2563eb}
.btn-close{background:#334155;color:#e2e8f0}
.btn-close:hover{background:#475569}
.copied{color:#4ade80;font-size:13px;text-align:center;margin-top:8px;min-height:20px}
</style>
</head>
<body>
<div class="card" id="content">
  <h1>{{TITLE}}</h1>
  <p class="warning">⚠️ Keep this safe. Never share it. Do not screenshot.</p>
  <div class="words" id="words">{{WORDS_HTML}}</div>
  <div class="copied" id="copied"></div>
  <div class="timer">Auto-close in <span id="countdown">60</span>s</div>
  <div class="buttons">
    <button class="btn btn-copy" onclick="copyWords()">📋 Copy</button>
    <button class="btn btn-close" onclick="done()">Close</button>
  </div>
</div>
<script>
const token="{{TOKEN}}",secret="{{SECRET}}";
let remaining=60;
const interval=setInterval(()=>{remaining--;document.getElementById("countdown").textContent=remaining;if(remaining<=0)done()},1000);
function copyWords(){navigator.clipboard.writeText(secret).then(()=>{document.getElementById("copied").textContent="Copied!"}).catch(()=>{document.getElementById("copied").textContent="Copy failed — select manually"})}
function done(){
  clearInterval(interval);
  document.getElementById("content").innerHTML='<h1>🔒 Closed</h1><p style="color:#94a3b8;margin-top:8px">Secret has been cleared from display.</p>';
  fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,closed:true})});
}
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</body>
</html>
