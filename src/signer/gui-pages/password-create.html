<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password — Claw Wallet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1e293b;border-radius:16px;padding:40px;width:420px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
h1{font-size:20px;margin-bottom:8px;color:#f8fafc}
.subtitle{color:#94a3b8;font-size:14px;margin-bottom:24px}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;margin-top:16px}
input[type=password]{width:100%;padding:12px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#f8fafc;font-size:15px;outline:none;transition:border .2s}
input[type=password]:focus{border-color:#3b82f6}
.strength-bar{height:4px;border-radius:2px;background:#334155;margin-top:8px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.checks{margin-top:12px;font-size:12px;color:#94a3b8}
.checks div{padding:2px 0}
.checks .pass{color:#4ade80}
.checks .fail{color:#94a3b8}
.error{color:#f87171;font-size:13px;margin-top:8px;min-height:20px}
.buttons{display:flex;gap:12px;margin-top:24px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.btn-cancel{background:#334155;color:#e2e8f0}
.btn-cancel:hover{background:#475569}
.btn-submit{background:#3b82f6;color:#fff}
.btn-submit:hover{background:#2563eb}
.btn-submit:disabled{background:#1e3a5f;color:#64748b;cursor:not-allowed}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 {{TITLE}}</h1>
  <p class="subtitle">{{DESCRIPTION}}</p>
  <form id="form">
    <label for="pw1">Password</label>
    <input type="password" id="pw1" autocomplete="new-password" autofocus>
    <div class="strength-bar"><div class="strength-fill" id="bar"></div></div>
    <div class="checks" id="checks"></div>
    <label for="pw2">Confirm Password</label>
    <input type="password" id="pw2" autocomplete="new-password">
    <div class="error" id="error"></div>
    <div class="buttons">
      <button type="button" class="btn btn-cancel" onclick="cancel()">Cancel</button>
      <button type="submit" class="btn btn-submit" id="submit" disabled>Confirm</button>
    </div>
  </form>
</div>
<script>
const token="{{TOKEN}}";
const pw1=document.getElementById("pw1"),pw2=document.getElementById("pw2"),bar=document.getElementById("bar"),checks=document.getElementById("checks"),err=document.getElementById("error"),submit=document.getElementById("submit");
const rules=[
  {re:/.{12,}/,label:"At least 12 characters"},
  {re:/[A-Z]/,label:"Uppercase letter"},
  {re:/[a-z]/,label:"Lowercase letter"},
  {re:/[0-9]/,label:"Digit"},
  {re:/[^A-Za-z0-9]/,label:"Special character"}
];
function validate(){
  const v=pw1.value,passed=rules.filter(r=>r.test?r.test(v):r.re.test(v));
  const pct=Math.round(passed.length/rules.length*100);
  bar.style.width=pct+"%";
  bar.style.background=pct<40?"#ef4444":pct<80?"#f59e0b":"#4ade80";
  checks.innerHTML=rules.map(r=>`<div class="${r.re.test(v)?"pass":"fail"}">${r.re.test(v)?"✓":"○"} ${r.label}</div>`).join("");
  const match=pw1.value&&pw2.value&&pw1.value===pw2.value;
  const strong=passed.length===rules.length;
  err.textContent=pw2.value&&!match?"Passwords do not match":"";
  submit.disabled=!(match&&strong);
}
pw1.addEventListener("input",validate);
pw2.addEventListener("input",validate);
document.getElementById("form").addEventListener("submit",async e=>{
  e.preventDefault();
  submit.disabled=true;
  await fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:pw1.value})});
  document.body.innerHTML='<div class="card"><h1>✓ Password set</h1></div>';
});
function cancel(){
  fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,cancelled:true})});
  document.body.innerHTML='<div class="card"><h1>Cancelled</h1></div>';
}
</script>
</body>
</html>
