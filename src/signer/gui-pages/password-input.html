<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Required — Claw Wallet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1e293b;border-radius:16px;padding:40px;width:420px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
h1{font-size:20px;margin-bottom:8px;color:#f8fafc}
.subtitle{color:#94a3b8;font-size:14px;margin-bottom:24px}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;margin-top:16px}
input[type=password]{width:100%;padding:12px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#f8fafc;font-size:15px;outline:none;transition:border .2s}
input[type=password]:focus{border-color:#3b82f6}
.error{color:#f87171;font-size:13px;margin-top:8px;min-height:20px}
.buttons{display:flex;gap:12px;margin-top:24px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.btn-cancel{background:#334155;color:#e2e8f0}
.btn-cancel:hover{background:#475569}
.btn-submit{background:#3b82f6;color:#fff}
.btn-submit:hover{background:#2563eb}
</style>
</head>
<body>
<div class="card">
  <h1>🔑 {{TITLE}}</h1>
  <p class="subtitle">{{DESCRIPTION}}</p>
  <form id="form">
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <div class="error" id="error"></div>
    <div class="buttons">
      <button type="button" class="btn btn-cancel" onclick="cancel()">Cancel</button>
      <button type="submit" class="btn btn-submit">Unlock</button>
    </div>
  </form>
</div>
<script>
const token="{{TOKEN}}";
document.getElementById("form").addEventListener("submit",async e=>{
  e.preventDefault();
  const pw=document.getElementById("pw").value;
  if(!pw){document.getElementById("error").textContent="Password required";return}
  await fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:pw})});
  document.body.innerHTML='<div class="card"><h1>✓ Unlocked</h1></div>';
});
function cancel(){
  fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,cancelled:true})});
  document.body.innerHTML='<div class="card"><h1>Cancelled</h1></div>';
}
</script>
</body>
</html>
