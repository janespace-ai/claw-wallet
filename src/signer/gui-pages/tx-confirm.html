<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Transaction — Claw Wallet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1e293b;border-radius:16px;padding:40px;width:460px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
h1{font-size:20px;margin-bottom:20px;color:#f8fafc}
.detail{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #334155;font-size:14px}
.detail .label{color:#94a3b8}
.detail .value{color:#f8fafc;font-weight:500;word-break:break-all;max-width:260px;text-align:right}
.detail .value.addr{font-family:monospace;font-size:12px}
.buttons{display:flex;gap:12px;margin-top:28px}
.btn{flex:1;padding:14px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600}
.btn-reject{background:#dc2626;color:#fff}
.btn-reject:hover{background:#b91c1c}
.btn-confirm{background:#16a34a;color:#fff}
.btn-confirm:hover{background:#15803d}
</style>
</head>
<body>
<div class="card">
  <h1>📋 Confirm Transaction</h1>
  <div class="detail"><span class="label">To</span><span class="value addr">{{TO}}</span></div>
  <div class="detail"><span class="label">Amount</span><span class="value">{{AMOUNT}}</span></div>
  <div class="detail"><span class="label">Token</span><span class="value">{{TOKEN_SYMBOL}}</span></div>
  <div class="detail"><span class="label">Chain</span><span class="value">{{CHAIN}}</span></div>
  <div class="buttons">
    <button class="btn btn-reject" onclick="respond(false)">Reject</button>
    <button class="btn btn-confirm" onclick="respond(true)">Confirm</button>
  </div>
</div>
<script>
const token="{{TOKEN}}";
async function respond(confirmed){
  await fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,confirmed})});
  document.body.innerHTML=`<div class="card"><h1>${confirmed?"✓ Confirmed":"✗ Rejected"}</h1></div>`;
}
</script>
</body>
</html>
